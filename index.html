<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocha Content · Briefing</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @font-face {
    font-family: 'Helvetica World';
    src: local('Helvetica World'), local('Helvetica'), local('Arial');
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Helvetica World', 'Helvetica', 'Arial', sans-serif;
  }

  :root {
    --cream: #EFE0B3;
    --cream-light: #F7ECCC;
    --cream-soft: #FAF3E0;
    --white: #FFFFFF;
    --pink: #D94194;
    --orange: #FF751F;
    --pink-soft: #FAE3F0;
    --orange-soft: #FFE5D1;
    --dark: #1A1612;
    --gray: #6B6258;
    --light-gray: #D4C9B5;
    --shadow: 0 8px 32px rgba(26, 22, 18, 0.08);
    --shadow-lg: 0 20px 60px rgba(26, 22, 18, 0.12);
    --gradient: linear-gradient(135deg, var(--pink) 0%, var(--orange) 100%);
  }

  body {
    background: linear-gradient(135deg, #F5EBD0 0%, #FAF3E0 100%);
    min-height: 100vh;
    color: var(--dark);
    overflow-x: hidden;
  }

  .app {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 24px;
  }

  .sidebar {
    background: var(--white);
    border-radius: 32px;
    padding: 32px 20px;
    box-shadow: var(--shadow);
    height: fit-content;
    position: sticky;
    top: 24px;
  }

  .logo-area {
    padding: 0 12px 28px;
    border-bottom: 1px solid var(--cream);
    margin-bottom: 24px;
    text-align: center;
  }

  .logo-img {
    max-width: 100%;
    height: auto;
    max-height: 80px;
    object-fit: contain;
  }

  .logo-tag {
    display: inline-block;
    margin-top: 8px;
    font-size: 10px;
    color: var(--gray);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    background: var(--cream-soft);
    border-radius: 100px;
  }

  .nav-title {
    font-size: 11px;
    color: var(--gray);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 0 12px;
    margin-bottom: 12px;
  }

  .nav-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 14px;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    color: var(--gray);
    font-size: 14px;
    font-weight: 500;
  }

  .nav-item:hover {
    background: var(--cream-soft);
    color: var(--dark);
  }

  .nav-item.active {
    background: var(--gradient);
    color: var(--white);
    font-weight: 600;
  }

  .nav-item.completed::after {
    content: '✓';
    position: absolute;
    right: 14px;
    width: 18px;
    height: 18px;
    background: var(--pink);
    color: var(--white);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
  }

  .nav-icon {
    width: 32px;
    height: 32px;
    background: var(--cream-soft);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.25s;
  }

  .nav-item.active .nav-icon {
    background: rgba(255,255,255,0.25);
    color: var(--white);
  }

  .nav-icon svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
  }

  .progress-card {
    background: var(--gradient);
    border-radius: 20px;
    padding: 24px;
    margin-top: 24px;
    color: var(--white);
    position: relative;
    overflow: hidden;
  }

  .progress-card::before {
    content: '';
    position: absolute;
    width: 120px;
    height: 120px;
    background: var(--white);
    opacity: 0.1;
    border-radius: 50%;
    top: -40px;
    right: -40px;
  }

  .progress-card::after {
    content: '';
    position: absolute;
    width: 80px;
    height: 80px;
    background: var(--white);
    opacity: 0.08;
    border-radius: 50%;
    bottom: -20px;
    left: -20px;
  }

  .progress-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    opacity: 0.85;
    margin-bottom: 8px;
    position: relative;
  }

  .progress-percentage {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -1.5px;
    margin-bottom: 12px;
    position: relative;
  }

  .progress-bar {
    width: 100%;
    height: 6px;
    background: rgba(255, 255, 255, 0.25);
    border-radius: 100px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: var(--white);
    border-radius: 100px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .progress-text {
    font-size: 12px;
    margin-top: 12px;
    opacity: 0.9;
    position: relative;
  }

  .main {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .header {
    background: var(--white);
    border-radius: 24px;
    padding: 28px 32px;
    box-shadow: var(--shadow);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .header-left {
    flex: 1;
  }

  .breadcrumb {
    font-size: 12px;
    color: var(--gray);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  .header-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -1px;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-actions {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .icon-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--cream-soft);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    color: var(--dark);
  }

  .icon-btn:hover {
    background: var(--gradient);
    color: var(--white);
    transform: translateY(-2px);
  }

  .icon-btn svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
  }

  .content {
    background: var(--white);
    border-radius: 32px;
    padding: 40px;
    box-shadow: var(--shadow-lg);
    min-height: 600px;
  }

  .step-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 8px;
  }

  .step-num {
    width: 48px;
    height: 48px;
    background: var(--gradient);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: var(--white);
  }

  .step-info h2 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.8px;
    color: var(--dark);
    line-height: 1.1;
  }

  .step-info p {
    font-size: 13px;
    color: var(--gray);
    margin-top: 2px;
  }

  .step-divider {
    height: 1px;
    background: linear-gradient(to right, var(--pink) 0%, var(--orange) 50%, transparent 100%);
    margin: 28px 0 32px;
    opacity: 0.3;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .form-group.full {
    grid-column: 1 / -1;
  }

  .form-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--dark);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .form-label .required {
    color: var(--pink);
    font-size: 14px;
  }

  .form-hint {
    font-size: 11px;
    color: var(--gray);
    margin-top: -4px;
    line-height: 1.4;
  }

  .form-input, .form-textarea, .form-select {
    padding: 14px 16px;
    background: var(--cream-soft);
    border: 2px solid transparent;
    border-radius: 14px;
    font-size: 14px;
    color: var(--dark);
    transition: all 0.2s;
    font-family: inherit;
    width: 100%;
  }

  .form-input:focus, .form-textarea:focus, .form-select:focus {
    outline: none;
    background: var(--white);
    border-color: var(--pink);
    box-shadow: 0 0 0 4px rgba(217, 65, 148, 0.15);
  }

  .form-textarea {
    resize: vertical;
    min-height: 100px;
    line-height: 1.5;
  }

  .form-input::placeholder, .form-textarea::placeholder {
    color: var(--light-gray);
  }

  .options-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  .options-grid.cols-4 {
    grid-template-columns: repeat(4, 1fr);
  }

  .option-card {
    padding: 14px 16px;
    background: var(--cream-soft);
    border: 2px solid transparent;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 500;
    color: var(--dark);
  }

  .option-card:hover {
    background: var(--cream-light);
    transform: translateY(-1px);
  }

  .option-card.selected {
    background: var(--gradient);
    color: var(--white);
    border-color: transparent;
  }

  .option-check {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid var(--light-gray);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .option-card.selected .option-check {
    border-color: var(--white);
    background: var(--white);
  }

  .option-card.selected .option-check::after {
    content: '';
    width: 8px;
    height: 8px;
    background: var(--pink);
    border-radius: 50%;
  }

  .size-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
  }

  .size-card {
    padding: 16px 8px;
    background: var(--cream-soft);
    border: 2px solid transparent;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--dark);
  }

  .size-card:hover {
    transform: translateY(-2px);
    background: var(--cream-light);
  }

  .size-card.selected {
    background: var(--gradient);
    color: var(--white);
    transform: translateY(-2px);
    box-shadow: 0 8px 16px rgba(217, 65, 148, 0.25);
  }

  .form-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 40px;
    padding-top: 28px;
    border-top: 1px solid var(--cream);
  }

  .step-indicator {
    display: flex;
    gap: 6px;
  }

  .step-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--light-gray);
    transition: all 0.3s;
  }

  .step-dot.active {
    background: var(--gradient);
    width: 24px;
    border-radius: 100px;
  }

  .step-dot.completed {
    background: var(--orange);
  }

  .footer-actions {
    display: flex;
    gap: 12px;
  }

  .btn {
    padding: 14px 28px;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-secondary {
    background: var(--cream-soft);
    color: var(--dark);
  }

  .btn-secondary:hover {
    background: var(--cream);
  }

  .btn-primary {
    background: var(--gradient);
    color: var(--white);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 24px rgba(217, 65, 148, 0.3);
  }

  .btn-whatsapp {
    background: #25D366;
    color: var(--white);
  }

  .btn-whatsapp:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 24px rgba(37, 211, 102, 0.3);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2.5;
  }

  .success-screen {
    text-align: center;
    padding: 40px 20px;
  }

  .success-icon {
    width: 80px;
    height: 80px;
    background: var(--gradient);
    border-radius: 50%;
    margin: 0 auto 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 16px 32px rgba(217, 65, 148, 0.3);
  }

  .success-icon svg {
    width: 40px;
    height: 40px;
    stroke: var(--white);
    fill: none;
    stroke-width: 3;
  }

  @keyframes pop {
    0% { transform: scale(0); }
    100% { transform: scale(1); }
  }

  .success-screen h2 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 12px;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .success-screen p {
    font-size: 15px;
    color: var(--gray);
    max-width: 480px;
    margin: 0 auto 32px;
    line-height: 1.6;
  }

  .summary-card {
    background: var(--cream-soft);
    border-radius: 20px;
    padding: 24px;
    text-align: left;
    max-width: 480px;
    margin: 0 auto 24px;
    border: 1px solid var(--cream);
  }

  .summary-card h4 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gray);
    margin-bottom: 12px;
  }

  .summary-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    font-size: 13px;
    border-bottom: 1px solid var(--cream);
  }

  .summary-row:last-child { border: none; }

  .summary-row .label { color: var(--gray); }
  .summary-row .value { color: var(--dark); font-weight: 600; }

  .action-note {
    background: linear-gradient(135deg, rgba(217, 65, 148, 0.08) 0%, rgba(255, 117, 31, 0.08) 100%);
    border: 1px solid rgba(217, 65, 148, 0.15);
    border-radius: 16px;
    padding: 16px 20px;
    max-width: 480px;
    margin: 0 auto 24px;
    font-size: 13px;
    color: var(--dark);
    line-height: 1.5;
  }

  .action-note strong {
    color: var(--pink);
  }

  .fade-in {
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 1024px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: relative; top: 0; }
    .nav-list { flex-direction: row; overflow-x: auto; gap: 8px; padding-bottom: 8px; }
    .nav-item { flex-shrink: 0; }
  }

  @media (max-width: 640px) {
    .app { padding: 16px; gap: 16px; }
    .content { padding: 24px; }
    .form-grid { grid-template-columns: 1fr; }
    .options-grid, .options-grid.cols-4 { grid-template-columns: 1fr 1fr; }
    .size-grid { grid-template-columns: repeat(3, 1fr); }
    .header { padding: 20px; flex-direction: column; gap: 16px; align-items: flex-start; }
    .header-title { font-size: 22px; }
    .form-footer { flex-direction: column; gap: 16px; }
    .footer-actions { width: 100%; flex-wrap: wrap; }
    .btn { flex: 1; justify-content: center; }
    .success-screen .footer-actions { flex-direction: column; }
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--cream-soft); }
  ::-webkit-scrollbar-thumb { background: var(--gradient); border-radius: 100px; }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="logo-area">
      <img src="logo-rocha-content.jpeg" alt="Rocha Content" class="logo-img">
      <span class="logo-tag">Briefing</span>
    </div>

    <p class="nav-title">Etapas</p>
    <ul class="nav-list" id="navList">
      <li class="nav-item active" data-step="0">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
        Sobre a marca
      </li>
      <li class="nav-item" data-step="1">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg></div>
        Público-alvo
      </li>
      <li class="nav-item" data-step="2">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="13.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="10.5" r="2.5"/><circle cx="8.5" cy="7.5" r="2.5"/><circle cx="6.5" cy="12.5" r="2.5"/><path d="M12 22a10 10 0 110-20 8 8 0 018 8 5 5 0 01-5 5h-2.5a1.5 1.5 0 00-1.06 2.56A1.5 1.5 0 0112 22z"/></svg></div>
        Identidade visual
      </li>
      <li class="nav-item" data-step="3">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>
        Redes sociais
      </li>
      <li class="nav-item" data-step="4">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></div>
        Objetivos
      </li>
      <li class="nav-item" data-step="5">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>
        Tom de voz
      </li>
      <li class="nav-item" data-step="6">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M20 12V8H6a2 2 0 010-4h12v4M4 6v12c0 1.1.9 2 2 2h14v-4M18 12a2 2 0 000 4h4v-4z"/></svg></div>
        Kit de boas-vindas
      </li>
    </ul>

    <div class="progress-card">
      <p class="progress-label">Progresso</p>
      <div class="progress-percentage" id="progressPct">0%</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <p class="progress-text" id="progressText">Etapa 1 de 7</p>
    </div>
  </aside>

  <main class="main">
    <header class="header">
      <div class="header-left">
        <p class="breadcrumb">Briefing inicial</p>
        <h1 class="header-title" id="mainTitle">Olá! Vamos começar?</h1>
      </div>
      <div class="header-actions">
        <button class="icon-btn" title="Salvar">
          <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2zM17 21v-8H7v8M7 3v5h8"/></svg>
        </button>
        <button class="icon-btn" title="Ajuda">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3M12 17h.01"/></svg>
        </button>
      </div>
    </header>

    <section class="content" id="content"></section>
  </main>
</div>

<script>
  const WHATSAPP_NUMBER = '5511947890737';

  const steps = [
    {
      icon: '01', title: 'Sobre a marca', subtitle: 'Conta um pouco sobre o seu negócio',
      headerTitle: 'Conta sobre sua marca',
      fields: [
        { type: 'text', name: 'brandName', label: 'Nome da marca', placeholder: 'Ex: LiderCast', required: true },
        { type: 'text', name: 'ownerName', label: 'Nome do responsável', placeholder: 'Ex: Claudia Blanca', required: true },
        { type: 'textarea', name: 'whatSells', label: 'O que você vende?', placeholder: 'Produtos, serviços, infoprodutos…', required: true, full: true },
        { type: 'text', name: 'ticket', label: 'Ticket médio', placeholder: 'Ex: R$ 1.500', required: false },
        { type: 'text', name: 'time', label: 'Há quanto tempo no mercado?', placeholder: 'Ex: 3 anos', required: false },
        { type: 'textarea', name: 'differential', label: 'Quais seus diferenciais?', placeholder: 'O que te torna único no mercado?', required: false, full: true },
        { type: 'textarea', name: 'mission', label: 'Missão, visão e valores', placeholder: 'Se já tiver definido, compartilha aqui', required: false, full: true }
      ]
    },
    {
      icon: '02', title: 'Público-alvo', subtitle: 'Quem você quer atingir',
      headerTitle: 'Quem é seu público?',
      fields: [
        { type: 'textarea', name: 'idealClient', label: 'Quem é seu cliente ideal?', placeholder: 'Idade, gênero, profissão, dores, desejos…', required: true, full: true },
        { type: 'textarea', name: 'notClient', label: 'Quem NÃO é seu público?', placeholder: 'Importante pra evitar conteúdo desalinhado', hint: 'Esse campo evita que o conteúdo erre o tom', required: false, full: true }
      ]
    },
    {
      icon: '03', title: 'Identidade visual', subtitle: 'Estilo e referências da marca',
      headerTitle: 'Identidade visual',
      fields: [
        { type: 'options', name: 'hasManual', label: 'Tem manual de marca?', options: ['Sim, completo', 'Tenho parcialmente', 'Não tenho ainda'], required: true, full: true },
        { type: 'textarea', name: 'visualStyle', label: 'Preferência de estilo visual', placeholder: 'Minimalista, colorido, sério, descontraído…', required: false, full: true },
        { type: 'textarea', name: 'references', label: 'Referências que admira', placeholder: 'Perfis ou marcas que te inspiram visualmente', required: false, full: true },
        { type: 'options', name: 'hasMedia', label: 'Tem fotos e vídeos disponíveis?', options: ['Sim, em quantidade', 'Tenho pouca coisa', 'Não tenho nada'], required: true, full: true },
        { type: 'options', name: 'recordFreq', label: 'Frequência de gravação', options: ['Semanal', 'Quinzenal', 'Mensal', 'Sob demanda'], required: false, full: true }
      ]
    },
    {
      icon: '04', title: 'Redes sociais', subtitle: 'Onde sua marca está presente',
      headerTitle: 'Suas redes sociais',
      fields: [
        { type: 'options', name: 'platforms', label: 'Quais redes quer trabalhar?', options: ['Instagram', 'TikTok'], multi: true, required: true, full: true },
        { type: 'text', name: 'instagramHandle', label: '@ do Instagram', placeholder: '@suamarca', required: false },
        { type: 'text', name: 'tiktokHandle', label: '@ do TikTok', placeholder: '@suamarca', required: false },
        { type: 'options', name: 'hadManagement', label: 'Já teve gestão antes?', options: ['Sim, tive', 'Nunca tive'], required: true, full: true },
        { type: 'textarea', name: 'whatWorked', label: 'O que funcionou ou não funcionou?', placeholder: 'Pode compartilhar aprendizados anteriores', required: false, full: true }
      ]
    },
    {
      icon: '05', title: 'Objetivos', subtitle: 'O que esperar dessa parceria',
      headerTitle: 'Seus objetivos',
      fields: [
        { type: 'options', name: 'mainGoal', label: 'Objetivo principal agora', options: ['Crescer seguidores', 'Gerar leads', 'Vender mais', 'Construir autoridade'], required: true, full: true },
        { type: 'textarea', name: 'launches', label: 'Lançamentos ou eventos previstos', placeholder: 'Próximos meses — algo importante a comunicar?', required: false, full: true },
        { type: 'text', name: 'goal', label: 'Meta concreta', placeholder: 'Ex: 10K seguidores, R$ 50K em vendas', required: false, full: true }
      ]
    },
    {
      icon: '06', title: 'Tom de voz', subtitle: 'Como sua marca se comunica',
      headerTitle: 'Tom de comunicação',
      fields: [
        { type: 'options', name: 'tone', label: 'Como quer ser visto?', options: ['Autoridade séria', 'Próximo e descontraído', 'Inspirador e motivador', 'Educativo e técnico'], required: true, full: true },
        { type: 'textarea', name: 'avoid', label: 'Temas que NÃO quer abordar', placeholder: 'Política, religião, polêmicas específicas…', required: false, full: true },
        { type: 'textarea', name: 'admire', label: 'Concorrentes que admira', placeholder: 'Perfis que te inspiram pelo tom de comunicação', required: false, full: true },
        { type: 'textarea', name: 'avoidLooking', label: 'Quem NÃO quer parecer', placeholder: 'Concorrentes ou estilos a evitar', required: false, full: true }
      ]
    },
    {
      icon: '07', title: 'Kit de boas-vindas', subtitle: 'Vamos preparar um mimo especial pra você',
      headerTitle: 'Seu kit de boas-vindas',
      fields: [
        { type: 'sizes', name: 'shirtSize', label: 'Tamanho da camisa', hint: 'Vamos enviar um kit pessoal pra você 💝', options: ['PP', 'P', 'M', 'G', 'GG', 'XG'], required: true, full: true },
        { type: 'text', name: 'address', label: 'Endereço completo para envio', placeholder: 'Rua, número, complemento, bairro', required: false, full: true },
        { type: 'text', name: 'cep', label: 'CEP', placeholder: '00000-000', required: false },
        { type: 'text', name: 'cityState', label: 'Cidade / Estado', placeholder: 'São Paulo / SP', required: false }
      ]
    }
  ];

  let currentStep = 0;
  const formData = {};
  const completed = new Set();

  const content = document.getElementById('content');
  const navList = document.getElementById('navList');
  const progressPct = document.getElementById('progressPct');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  const mainTitle = document.getElementById('mainTitle');

  function render() {
    if (currentStep >= steps.length) {
      renderSuccess();
      return;
    }

    const step = steps[currentStep];
    mainTitle.textContent = step.headerTitle;

    let html = `
      <div class="fade-in">
        <div class="step-header">
          <div class="step-num">${step.icon}</div>
          <div class="step-info">
            <h2>${step.title}</h2>
            <p>${step.subtitle}</p>
          </div>
        </div>
        <div class="step-divider"></div>
        <div class="form-grid">
    `;

    step.fields.forEach(field => {
      const value = formData[field.name] || (field.multi ? [] : '');
      const fullClass = field.full ? 'full' : '';

      html += `<div class="form-group ${fullClass}">`;
      html += `<label class="form-label">${field.label}${field.required ? '<span class="required">*</span>' : ''}</label>`;
      if (field.hint) html += `<p class="form-hint">${field.hint}</p>`;

      if (field.type === 'text') {
        html += `<input type="text" class="form-input" data-name="${field.name}" placeholder="${field.placeholder || ''}" value="${value}">`;
      } else if (field.type === 'textarea') {
        html += `<textarea class="form-textarea" data-name="${field.name}" placeholder="${field.placeholder || ''}">${value}</textarea>`;
      } else if (field.type === 'options') {
        const colsClass = field.options.length === 4 ? 'cols-4' : '';
        html += `<div class="options-grid ${colsClass}">`;
        field.options.forEach(opt => {
          const selected = field.multi
            ? (value || []).includes(opt) ? 'selected' : ''
            : value === opt ? 'selected' : '';
          html += `
            <div class="option-card ${selected}" data-name="${field.name}" data-value="${opt}" data-multi="${field.multi || false}">
              <div class="option-check"></div>
              ${opt}
            </div>
          `;
        });
        html += `</div>`;
      } else if (field.type === 'sizes') {
        html += `<div class="size-grid">`;
        field.options.forEach(size => {
          const selected = value === size ? 'selected' : '';
          html += `<div class="size-card ${selected}" data-name="${field.name}" data-value="${size}">${size}</div>`;
        });
        html += `</div>`;
      }
      html += `</div>`;
    });

    html += `
        </div>
        <div class="form-footer">
          <div class="step-indicator">
            ${steps.map((_, i) => `
              <div class="step-dot ${i === currentStep ? 'active' : ''} ${completed.has(i) ? 'completed' : ''}"></div>
            `).join('')}
          </div>
          <div class="footer-actions">
            <button class="btn btn-secondary" id="prevBtn" ${currentStep === 0 ? 'disabled' : ''}>
              <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
              Voltar
            </button>
            <button class="btn btn-primary" id="nextBtn">
              ${currentStep === steps.length - 1 ? 'Finalizar' : 'Próximo'}
              <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
          </div>
        </div>
      </div>
    `;

    content.innerHTML = html;
    bindEvents();
    updateProgress();
  }

  function bindEvents() {
    document.querySelectorAll('.form-input, .form-textarea').forEach(input => {
      input.addEventListener('input', e => {
        formData[e.target.dataset.name] = e.target.value;
      });
    });

    document.querySelectorAll('.option-card').forEach(card => {
      card.addEventListener('click', () => {
        const name = card.dataset.name;
        const value = card.dataset.value;
        const multi = card.dataset.multi === 'true';

        if (multi) {
          if (!formData[name]) formData[name] = [];
          if (formData[name].includes(value)) {
            formData[name] = formData[name].filter(v => v !== value);
            card.classList.remove('selected');
          } else {
            formData[name].push(value);
            card.classList.add('selected');
          }
        } else {
          formData[name] = value;
          document.querySelectorAll(`.option-card[data-name="${name}"]`).forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
        }
      });
    });

    document.querySelectorAll('.size-card').forEach(card => {
      card.addEventListener('click', () => {
        const name = card.dataset.name;
        const value = card.dataset.value;
        formData[name] = value;
        document.querySelectorAll(`.size-card[data-name="${name}"]`).forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
      });
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      if (currentStep > 0) {
        currentStep--;
        updateNav();
        render();
      }
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      completed.add(currentStep);
      currentStep++;
      updateNav();
      render();
    });
  }

  function updateNav() {
    document.querySelectorAll('.nav-item').forEach((item, i) => {
      item.classList.toggle('active', i === currentStep);
      item.classList.toggle('completed', completed.has(i));
    });
  }

  function updateProgress() {
    const pct = Math.round((completed.size / steps.length) * 100);
    progressPct.textContent = pct + '%';
    progressFill.style.width = pct + '%';
    progressText.textContent = `Etapa ${Math.min(currentStep + 1, steps.length)} de ${steps.length}`;
  }

  function renderSuccess() {
    mainTitle.textContent = 'Briefing concluído';
    progressPct.textContent = '100%';
    progressFill.style.width = '100%';
    progressText.textContent = 'Tudo pronto!';

    document.querySelectorAll('.nav-item').forEach(item => item.classList.add('completed'));

    const filled = Object.keys(formData).filter(k => formData[k] && formData[k].length).length;

    content.innerHTML = `
      <div class="success-screen fade-in">
        <div class="success-icon">
          <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2>Tudo certo, ${formData.ownerName || 'parceiro(a)'}!</h2>
        <p>Recebemos seu briefing completo. A partir de agora começa nossa imersão na sua marca. Em breve você receberá os próximos passos no nosso grupo do WhatsApp.</p>

        <div class="summary-card">
          <h4>Resumo</h4>
          <div class="summary-row"><span class="label">Marca</span><span class="value">${formData.brandName || '—'}</span></div>
          <div class="summary-row"><span class="label">Objetivo principal</span><span class="value">${formData.mainGoal || '—'}</span></div>
          <div class="summary-row"><span class="label">Tom de voz</span><span class="value">${formData.tone || '—'}</span></div>
          <div class="summary-row"><span class="label">Tamanho da camisa</span><span class="value">${formData.shirtSize || '—'}</span></div>
          <div class="summary-row"><span class="label">Campos preenchidos</span><span class="value">${filled} respostas</span></div>
        </div>

        <div class="action-note">
          📎 <strong>Próximo passo:</strong> Clique em "Enviar pelo WhatsApp" — o PDF será gerado automaticamente e você só precisa anexá-lo na conversa que abrirá.
        </div>

        <div class="footer-actions" style="justify-content: center;">
          <button class="btn btn-secondary" onclick="restart()">
            <svg viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6M3.51 9A9 9 0 0118.36 5.64L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
            Refazer
          </button>
          <button class="btn btn-primary" onclick="downloadPDF()">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            Baixar PDF
          </button>
          <button class="btn btn-whatsapp" onclick="sendWhatsApp()">
            <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M17.6 6.32A7.85 7.85 0 0012.05 4a7.94 7.94 0 00-6.88 11.93L4 20l4.18-1.1a7.93 7.93 0 003.87 1h.01c4.39 0 7.96-3.57 7.96-7.96a7.9 7.9 0 00-2.42-5.62zm-5.55 12.24a6.6 6.6 0 01-3.36-.92l-.24-.14-2.48.65.66-2.42-.16-.25a6.6 6.6 0 01-1.01-3.5 6.6 6.6 0 016.6-6.6c1.76 0 3.42.69 4.66 1.93a6.55 6.55 0 011.93 4.66 6.6 6.6 0 01-6.6 6.59zm3.62-4.94c-.2-.1-1.17-.58-1.35-.64-.18-.07-.31-.1-.45.1-.13.2-.51.64-.62.77-.11.13-.23.15-.43.05-.2-.1-.84-.31-1.6-.99-.59-.52-.99-1.17-1.1-1.37-.12-.2-.01-.31.09-.41.09-.09.2-.23.3-.35.1-.12.13-.2.2-.33.07-.13.03-.25-.02-.35-.05-.1-.45-1.08-.62-1.48-.16-.39-.32-.34-.45-.34-.12 0-.25-.02-.38-.02-.13 0-.35.05-.53.25-.18.2-.7.68-.7 1.66 0 .98.71 1.92.81 2.05.1.13 1.4 2.13 3.39 2.99.47.2.84.33 1.13.42.48.15.91.13 1.25.08.38-.06 1.17-.48 1.34-.94.16-.46.16-.86.12-.94-.05-.08-.18-.13-.38-.23z"/></svg>
            Enviar pelo WhatsApp
          </button>
        </div>
      </div>
    `;
  }

  function restart() {
    currentStep = 0;
    Object.keys(formData).forEach(k => delete formData[k]);
    completed.clear();
    updateNav();
    render();
  }

  function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    const pink = [217, 65, 148];
    const orange = [255, 117, 31];
    const dark = [26, 22, 18];
    const gray = [107, 98, 88];
    const cream = [239, 224, 179];

    doc.setFillColor(...pink);
    doc.rect(0, 0, 210, 40, 'F');
    doc.setFillColor(...orange);
    doc.rect(0, 35, 210, 5, 'F');

    doc.setTextColor(255, 255, 255);
    doc.setFontSize(22);
    doc.setFont('helvetica', 'bold');
    doc.text('rocha content', 20, 22);

    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    doc.text('BRIEFING DE CLIENTE', 20, 30);

    const today = new Date().toLocaleDateString('pt-BR');
    doc.setFontSize(9);
    doc.text(today, 170, 22);

    let y = 55;

    doc.setTextColor(...dark);
    doc.setFontSize(18);
    doc.setFont('helvetica', 'bold');
    doc.text(formData.brandName || 'Briefing', 20, y);
    y += 7;
    doc.setFontSize(11);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(...gray);
    doc.text(`Responsável: ${formData.ownerName || '—'}`, 20, y);
    y += 12;

    steps.forEach((step) => {
      if (y > 250) {
        doc.addPage();
        y = 20;
      }

      doc.setFillColor(...cream);
      doc.rect(20, y - 5, 170, 9, 'F');
      doc.setTextColor(...dark);
      doc.setFontSize(11);
      doc.setFont('helvetica', 'bold');
      doc.text(`${step.icon}. ${step.title.toUpperCase()}`, 22, y + 1);
      y += 12;

      step.fields.forEach(field => {
        const value = formData[field.name];
        const display = Array.isArray(value) ? value.join(', ') : (value || '—');

        if (y > 270) {
          doc.addPage();
          y = 20;
        }

        doc.setTextColor(...gray);
        doc.setFontSize(8);
        doc.setFont('helvetica', 'bold');
        doc.text(field.label.toUpperCase(), 22, y);
        y += 4;

        doc.setTextColor(...dark);
        doc.setFontSize(10);
        doc.setFont('helvetica', 'normal');
        const lines = doc.splitTextToSize(display, 165);
        doc.text(lines, 22, y);
        y += lines.length * 5 + 4;
      });

      y += 4;
    });

    const pageCount = doc.internal.getNumberOfPages();
    for (let i = 1; i <= pageCount; i++) {
      doc.setPage(i);
      doc.setFontSize(8);
      doc.setTextColor(...gray);
      doc.text(`rocha content · social media · página ${i} de ${pageCount}`, 105, 290, { align: 'center' });
    }

    return doc;
  }

  function downloadPDF() {
    const doc = generatePDF();
    const fileName = `briefing-${(formData.brandName || 'cliente').toLowerCase().replace(/\s+/g, '-')}.pdf`;
    doc.save(fileName);
  }

  function sendWhatsApp() {
    downloadPDF();

    setTimeout(() => {
      const message = encodeURIComponent(
        `Olá Keth! 💕\n\nAcabei de preencher o briefing da minha marca *${formData.brandName || ''}*.\n\nO PDF completo foi baixado no meu dispositivo — vou anexá-lo agora nesta conversa.\n\nResponsável: ${formData.ownerName || ''}\nObjetivo: ${formData.mainGoal || ''}\n\nNo aguardo dos próximos passos! ✨`
      );
      window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${message}`, '_blank');
    }, 800);
  }

  navList.addEventListener('click', e => {
    const item = e.target.closest('.nav-item');
    if (!item) return;
    const step = parseInt(item.dataset.step);
    if (step <= currentStep || completed.has(step)) {
      currentStep = step;
      updateNav();
      render();
    }
  });

  render();
</script>
</body>
</html>

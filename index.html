<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#D94194">
<title>Rocha Content - Briefing</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body { overflow-x: hidden; width: 100%; }

body {
  font-family: 'Helvetica World', 'Helvetica', Arial, sans-serif;
  background: linear-gradient(135deg, #F5EBD0 0%, #FAF3E0 100%);
  min-height: 100vh;
  color: #1A1612;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  padding-bottom: env(safe-area-inset-bottom);
}

/* === HEADER === */
.app-header {
  background: #FFFFFF;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  border-bottom: 1px solid #EFE0B3;
  position: sticky;
  top: 0;
  z-index: 100;
}

.app-logo {
  height: 38px;
  width: auto;
  flex-shrink: 0;
}

.step-counter {
  font-size: 12px;
  font-weight: 700;
  color: #D94194;
  background: #FAE3F0;
  padding: 6px 14px;
  border-radius: 100px;
  flex-shrink: 0;
}

/* === PROGRESS === */
.progress-section {
  background: #FFFFFF;
  padding: 14px 20px;
  border-bottom: 1px solid #EFE0B3;
}

.progress-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.progress-label {
  font-size: 13px;
  font-weight: 600;
  color: #1A1612;
}

.progress-pct {
  font-size: 13px;
  font-weight: 700;
  color: #D94194;
}

.progress-bar {
  width: 100%;
  height: 6px;
  background: #FAF3E0;
  border-radius: 100px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #D94194 0%, #FF751F 100%);
  border-radius: 100px;
  transition: width 0.5s ease;
  width: 0%;
}

/* === MAIN CONTENT === */
.app-main {
  max-width: 720px;
  margin: 0 auto;
  padding: 24px 20px 120px;
}

.step-tag {
  display: inline-block;
  background: linear-gradient(135deg, #D94194 0%, #FF751F 100%);
  color: #FFFFFF;
  padding: 6px 14px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.step-title {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.8px;
  line-height: 1.15;
  margin-bottom: 6px;
  color: #1A1612;
}

.step-subtitle {
  font-size: 14px;
  color: #6B6258;
  margin-bottom: 28px;
  line-height: 1.5;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 22px;
}

.form-label {
  font-size: 14px;
  font-weight: 600;
  color: #1A1612;
}

.required {
  color: #D94194;
  margin-left: 2px;
}

.form-hint {
  font-size: 12px;
  color: #6B6258;
  line-height: 1.4;
  margin-top: -4px;
}

.input, .textarea {
  width: 100%;
  padding: 14px 16px;
  background: #FAF3E0;
  border: 2px solid transparent;
  border-radius: 14px;
  font-size: 16px;
  font-family: inherit;
  color: #1A1612;
  transition: all 0.2s;
}

.input:focus, .textarea:focus {
  outline: none;
  background: #FFFFFF;
  border-color: #D94194;
  box-shadow: 0 0 0 3px rgba(217, 65, 148, 0.15);
}

.input::placeholder, .textarea::placeholder {
  color: #D4C9B5;
}

.textarea {
  resize: vertical;
  min-height: 110px;
  line-height: 1.5;
}

.input.error, .textarea.error,
.options-wrap.error, .sizes-wrap.error {
  border-color: #D94141;
}

.options-wrap, .sizes-wrap {
  border: 2px solid transparent;
  border-radius: 14px;
  transition: all 0.2s;
}

.options-wrap.error, .sizes-wrap.error {
  padding: 4px;
  background: rgba(217, 65, 65, 0.04);
}

.error-msg {
  font-size: 12px;
  color: #D94141;
  display: none;
  margin-top: 4px;
}

.error-msg.show { display: block; }

.options {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.option {
  padding: 14px 16px;
  background: #FAF3E0;
  border: 2px solid transparent;
  border-radius: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
  font-weight: 500;
  color: #1A1612;
  transition: all 0.2s;
}

.option:active { transform: scale(0.98); }

.option.selected {
  background: linear-gradient(135deg, #D94194 0%, #FF751F 100%);
  color: #FFFFFF;
}

.option-check {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid #D4C9B5;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.option.selected .option-check {
  border-color: #FFFFFF;
  background: #FFFFFF;
}

.option.selected .option-check::after {
  content: '';
  width: 9px;
  height: 9px;
  background: #D94194;
  border-radius: 50%;
}

.sizes {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.size {
  padding: 18px 8px;
  background: #FAF3E0;
  border: 2px solid transparent;
  border-radius: 14px;
  cursor: pointer;
  text-align: center;
  font-size: 16px;
  font-weight: 700;
  color: #1A1612;
  transition: all 0.2s;
}

.size:active { transform: scale(0.95); }

.size.selected {
  background: linear-gradient(135deg, #D94194 0%, #FF751F 100%);
  color: #FFFFFF;
  box-shadow: 0 6px 14px rgba(217, 65, 148, 0.25);
}

/* === FOOTER === */
.app-footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #FFFFFF;
  border-top: 1px solid #EFE0B3;
  padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
  display: flex;
  gap: 10px;
  z-index: 100;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
}

.btn {
  padding: 14px 20px;
  border-radius: 100px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s;
}

.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-back {
  background: #FAF3E0;
  color: #1A1612;
  flex: 0 0 auto;
  padding: 14px 18px;
}

.btn-next {
  flex: 1;
  background: linear-gradient(135deg, #D94194 0%, #FF751F 100%);
  color: #FFFFFF;
}

.btn-whatsapp {
  background: #25D366;
  color: #FFFFFF;
}

.btn svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2.5;
}

/* === SUCCESS === */
.success {
  text-align: center;
  padding: 24px 0;
}

.success-icon {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, #D94194 0%, #FF751F 100%);
  border-radius: 50%;
  margin: 20px auto 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 16px 32px rgba(217, 65, 148, 0.3);
}

.success-icon svg {
  width: 40px;
  height: 40px;
  stroke: #FFFFFF;
  fill: none;
  stroke-width: 3;
}

@keyframes pop {
  0% { transform: scale(0); }
  100% { transform: scale(1); }
}

.success h2 {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.8px;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #D94194 0%, #FF751F 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.success p {
  font-size: 14px;
  color: #6B6258;
  margin-bottom: 24px;
  line-height: 1.6;
}

.summary {
  background: #FAF3E0;
  border: 1px solid #EFE0B3;
  border-radius: 18px;
  padding: 20px;
  text-align: left;
  margin-bottom: 20px;
}

.summary h4 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #6B6258;
  margin-bottom: 12px;
}

.summary-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  font-size: 13px;
  border-bottom: 1px solid #EFE0B3;
  gap: 12px;
}

.summary-row:last-child { border: none; }
.summary-row .label { color: #6B6258; flex-shrink: 0; }
.summary-row .value { color: #1A1612; font-weight: 600; text-align: right; word-break: break-word; }

.note {
  background: linear-gradient(135deg, rgba(217, 65, 148, 0.08) 0%, rgba(255, 117, 31, 0.08) 100%);
  border: 1px solid rgba(217, 65, 148, 0.15);
  border-radius: 16px;
  padding: 14px 18px;
  margin-bottom: 20px;
  font-size: 13px;
  color: #1A1612;
  line-height: 1.5;
  text-align: left;
}

.note strong { color: #D94194; }

.success-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.success-actions .btn {
  width: 100%;
}

.btn-refazer {
  background: #FAF3E0;
  color: #1A1612;
}

/* === TOAST === */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #D94141;
  color: #FFFFFF;
  padding: 12px 22px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
  box-shadow: 0 8px 24px rgba(217, 65, 65, 0.3);
  z-index: 1000;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  max-width: 90vw;
  text-align: center;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

.fade-in { animation: fadeIn 0.4s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* === DESKTOP (acima de 768px) === */
@media (min-width: 769px) {
  body {
    background: linear-gradient(135deg, #F5EBD0 0%, #FAF3E0 100%);
    padding: 0;
  }

  .app-header {
    background: #FFFFFF;
    border-radius: 20px;
    margin: 24px auto 16px;
    max-width: 720px;
    padding: 20px 28px;
    border: none;
    position: relative;
    box-shadow: 0 8px 32px rgba(26, 22, 18, 0.08);
  }

  .app-logo {
    height: 48px;
  }

  .progress-section {
    background: #FFFFFF;
    border-radius: 20px;
    margin: 0 auto 16px;
    max-width: 720px;
    padding: 18px 28px;
    border: none;
    box-shadow: 0 8px 32px rgba(26, 22, 18, 0.08);
  }

  .app-main {
    background: #FFFFFF;
    border-radius: 24px;
    padding: 36px 40px;
    margin-bottom: 24px;
    box-shadow: 0 20px 60px rgba(26, 22, 18, 0.08);
  }

  .step-title {
    font-size: 32px;
  }

  .options {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  .options.options-4 {
    grid-template-columns: repeat(2, 1fr);
  }

  .sizes {
    grid-template-columns: repeat(6, 1fr);
  }

  .app-footer {
    position: sticky;
    bottom: 24px;
    max-width: 720px;
    margin: 0 auto 24px;
    border-radius: 100px;
    border: none;
    box-shadow: 0 8px 32px rgba(26, 22, 18, 0.12);
    padding: 14px 20px;
  }
}

/* === DESKTOP GRANDE (acima de 1024px) === */
@media (min-width: 1024px) {
  .app-header, .progress-section, .app-main, .app-footer {
    max-width: 880px;
  }
}
</style>

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 2500);
}

function render() {
  if (currentStep >= steps.length) {
    renderSuccess();
    return;
  }

  var step = steps[currentStep];
  stepCounter.textContent = (currentStep + 1) + ' / ' + steps.length;
  progressLabel.textContent = step.title;
  prevBtn.disabled = currentStep === 0;
  nextBtnText.textContent = currentStep === steps.length - 1 ? 'Finalizar' : 'Próximo';

  var html = '<div class="fade-in">';
  html += '<span class="step-tag">Etapa ' + step.icon + '</span>';
  html += '<h1 class="step-title">' + step.title + '</h1>';
  html += '<p class="step-subtitle">' + step.subtitle + '</p>';

  for (var i = 0; i < step.fields.length; i++) {
    var field = step.fields[i];
    var value = formData[field.name];
    if (value == null) value = field.multi ? [] : '';

    html += '<div class="form-group">';
    html += '<label class="form-label">' + field.label + '<span class="required">*</span></label>';
    if (field.hint) html += '<p class="form-hint">' + field.hint + '</p>';

    if (field.type === 'text') {
      html += '<input type="text" class="input" data-name="' + field.name + '" placeholder="' + escapeHtml(field.placeholder || '') + '" value="' + escapeHtml(value) + '">';
    } else if (field.type === 'number') {
      html += '<input type="number" inputmode="numeric" pattern="[0-9]*" class="input" data-name="' + field.name + '" placeholder="' + escapeHtml(field.placeholder || '') + '" value="' + escapeHtml(value) + '" min="0">';
    } else if (field.type === 'textarea') {
      html += '<textarea class="textarea" data-name="' + field.name + '" placeholder="' + escapeHtml(field.placeholder || '') + '">' + escapeHtml(value) + '</textarea>';
    } else if (field.type === 'options') {
      var optsClass = field.options.length === 4 ? 'options options-4' : 'options';
      html += '<div class="options-wrap" data-name="' + field.name + '"><div class="' + optsClass + '">';
      for (var j = 0; j < field.options.length; j++) {
        var opt = field.options[j];
        var sel = field.multi ? (value.indexOf(opt) > -1 ? 'selected' : '') : (value === opt ? 'selected' : '');
        html += '<div class="option ' + sel + '" data-name="' + field.name + '" data-value="' + escapeHtml(opt) + '" data-multi="' + (field.multi ? 'true' : 'false') + '">';
        html += '<div class="option-check"></div>' + opt + '</div>';
      }
      html += '</div></div>';
    } else if (field.type === 'sizes') {
      html += '<div class="sizes-wrap" data-name="' + field.name + '"><div class="sizes">';
      for (var k = 0; k < field.options.length; k++) {
        var size = field.options[k];
        var sel = value === size ? 'selected' : '';
        html += '<div class="size ' + sel + '" data-name="' + field.name + '" data-value="' + size + '">' + size + '</div>';
      }
      html += '</div></div>';
    }

    html += '<div class="error-msg" data-error-for="' + field.name + '">Esse campo é obrigatório</div>';
    html += '</div>';
  }

  html += '</div>';
  main.innerHTML = html;

  bindEvents();
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function bindEvents() {
  var inputs = main.querySelectorAll('.input, .textarea');
  for (var i = 0; i < inputs.length; i++) {
    inputs[i].addEventListener('input', function(e) {
      formData[e.target.dataset.name] = e.target.value;
      e.target.classList.remove('error');
      var em = main.querySelector('[data-error-for="' + e.target.dataset.name + '"]');
      if (em) em.classList.remove('show');
    });
  }

  var options = main.querySelectorAll('.option');
  for (var i = 0; i < options.length; i++) {
    options[i].addEventListener('click', function(e) {
      var card = e.currentTarget;
      var name = card.dataset.name;
      var value = card.dataset.value;
      var multi = card.dataset.multi === 'true';

      if (multi) {
        if (!formData[name]) formData[name] = [];
        var idx = formData[name].indexOf(value);
        if (idx > -1) {
          formData[name].splice(idx, 1);
          card.classList.remove('selected');
        } else {
          formData[name].push(value);
          card.classList.add('selected');
        }
      } else {
        formData[name] = value;
        var allOpts = main.querySelectorAll('.option[data-name="' + name + '"]');
        for (var j = 0; j < allOpts.length; j++) allOpts[j].classList.remove('selected');
        card.classList.add('selected');
      }

      var wrap = main.querySelector('.options-wrap[data-name="' + name + '"]');
      if (wrap) wrap.classList.remove('error');
      var em = main.querySelector('[data-error-for="' + name + '"]');
      if (em) em.classList.remove('show');
    });
  }

  var sizes = main.querySelectorAll('.size');
  for (var i = 0; i < sizes.length; i++) {
    sizes[i].addEventListener('click', function(e) {
      var card = e.currentTarget;
      var name = card.dataset.name;
      var value = card.dataset.value;
      formData[name] = value;
      var allSizes = main.querySelectorAll('.size[data-name="' + name + '"]');
      for (var j = 0; j < allSizes.length; j++) allSizes[j].classList.remove('selected');
      card.classList.add('selected');

      var wrap = main.querySelector('.sizes-wrap[data-name="' + name + '"]');
      if (wrap) wrap.classList.remove('error');
      var em = main.querySelector('[data-error-for="' + name + '"]');
      if (em) em.classList.remove('show');
    });
  }
}

function validateStep() {
  var step = steps[currentStep];
  var isValid = true;
  var firstErrorEl = null;

  for (var i = 0; i < step.fields.length; i++) {
    var field = step.fields[i];
    var value = formData[field.name];
    var isEmpty = field.multi
      ? (!value || value.length === 0)
      : (!value || (typeof value === 'string' && value.trim() === ''));

    var em = main.querySelector('[data-error-for="' + field.name + '"]');

    if (isEmpty) {
      isValid = false;
      if (em) em.classList.add('show');

      if (field.type === 'text' || field.type === 'textarea' || field.type === 'number') {
        var input = main.querySelector('[data-name="' + field.name + '"]');
        if (input) {
          input.classList.add('error');
          if (!firstErrorEl) firstErrorEl = input;
        }
      } else if (field.type === 'options') {
        var wrap = main.querySelector('.options-wrap[data-name="' + field.name + '"]');
        if (wrap) {
          wrap.classList.add('error');
          if (!firstErrorEl) firstErrorEl = wrap;
        }
      } else if (field.type === 'sizes') {
        var wrap = main.querySelector('.sizes-wrap[data-name="' + field.name + '"]');
        if (wrap) {
          wrap.classList.add('error');
          if (!firstErrorEl) firstErrorEl = wrap;
        }
      }
    }
  }

  if (!isValid) {
    showToast('Preencha todos os campos antes de continuar');
    if (firstErrorEl) firstErrorEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  return isValid;
}

function updateProgress() {
  var doneCount = 0;
  for (var k in completed) doneCount++;
  var pct = Math.round((doneCount / steps.length) * 100);
  progressPct.textContent = pct + '%';
  progressFill.style.width = pct + '%';
}

function renderSuccess() {
  stepCounter.textContent = 'Concluído';
  progressLabel.textContent = 'Tudo pronto!';
  progressPct.textContent = '100%';
  progressFill.style.width = '100%';
  footer.style.display = 'none';

  var filled = 0;
  for (var k in formData) {
    if (formData[k] && formData[k].length) filled++;
  }

  var html = '<div class="success fade-in">';
  html += '<div class="success-icon"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div>';
  html += '<h2>Tudo certo, ' + escapeHtml(formData.ownerName || 'parceiro(a)') + '!</h2>';
  html += '<p>Recebemos seu briefing completo. Em breve você receberá os próximos passos no nosso grupo do WhatsApp.</p>';

  html += '<div class="summary"><h4>Resumo</h4>';
  html += '<div class="summary-row"><span class="label">Marca</span><span class="value">' + escapeHtml(formData.brandName || '-') + '</span></div>';
  html += '<div class="summary-row"><span class="label">Objetivo</span><span class="value">' + escapeHtml(formData.mainGoal || '-') + '</span></div>';
  html += '<div class="summary-row"><span class="label">Tom de voz</span><span class="value">' + escapeHtml(formData.tone || '-') + '</span></div>';
  html += '<div class="summary-row"><span class="label">Preenchidos</span><span class="value">' + filled + ' respostas</span></div>';
  html += '</div>';

  html += '<div class="note">📎 Toque em <strong>"Baixar PDF"</strong> e envie o arquivo no nosso grupo do WhatsApp.</div>';

  html += '<div class="success-actions">';
  html += '<button class="btn btn-next" onclick="downloadPDF()"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Baixar PDF</button>';
  html += '<button class="btn btn-refazer" onclick="restart()">Refazer</button>';
  html += '</div>';

  html += '</div>';
  main.innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  currentStep = 0;
  formData = {};
  completed = {};
  footer.style.display = '';
  render();
}

function generatePDF() {
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF();

  doc.setFillColor(217, 65, 148);
  doc.rect(0, 0, 210, 40, 'F');
  doc.setFillColor(255, 117, 31);
  doc.rect(0, 35, 210, 5, 'F');

  doc.setTextColor(255, 255, 255);
  doc.setFontSize(22);
  doc.setFont('helvetica', 'bold');
  doc.text('rocha content', 20, 22);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.text('BRIEFING DE CLIENTE', 20, 30);

  var today = new Date().toLocaleDateString('pt-BR');
  doc.setFontSize(9);
  doc.text(today, 170, 22);

  var y = 55;
  doc.setTextColor(26, 22, 18);
  doc.setFontSize(18);
  doc.setFont('helvetica', 'bold');
  doc.text(formData.brandName || 'Briefing', 20, y);
  y += 7;
  doc.setFontSize(11);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(107, 98, 88);
  doc.text('Responsável: ' + (formData.ownerName || '-'), 20, y);
  y += 12;

  for (var i = 0; i < steps.length; i++) {
    var step = steps[i];
    if (y > 250) { doc.addPage(); y = 20; }

    doc.setFillColor(239, 224, 179);
    doc.rect(20, y - 5, 170, 9, 'F');
    doc.setTextColor(26, 22, 18);
    doc.setFontSize(11);
    doc.setFont('helvetica', 'bold');
    doc.text(step.icon + '. ' + step.title.toUpperCase(), 22, y + 1);
    y += 12;

    for (var j = 0; j < step.fields.length; j++) {
      var field = step.fields[j];
      var value = formData[field.name];
      var display = Array.isArray(value) ? value.join(', ') : (value || '-');

      if (y > 270) { doc.addPage(); y = 20; }

      doc.setTextColor(107, 98, 88);
      doc.setFontSize(8);
      doc.setFont('helvetica', 'bold');
      doc.text(field.label.toUpperCase(), 22, y);
      y += 4;

      doc.setTextColor(26, 22, 18);
      doc.setFontSize(10);
      doc.setFont('helvetica', 'normal');
      var lines = doc.splitTextToSize(display, 165);
      doc.text(lines, 22, y);
      y += lines.length * 5 + 4;
    }

    y += 4;
  }

  var pageCount = doc.internal.getNumberOfPages();
  for (var p = 1; p <= pageCount; p++) {
    doc.setPage(p);
    doc.setFontSize(8);
    doc.setTextColor(107, 98, 88);
    doc.text('rocha content - página ' + p + ' de ' + pageCount, 105, 290, { align: 'center' });
  }

  return doc;
}

function downloadPDF() {
  var doc = generatePDF();
  var fileName = 'briefing-' + (formData.brandName || 'cliente').toLowerCase().replace(/\s+/g, '-') + '.pdf';
  doc.save(fileName);
}

prevBtn.addEventListener('click', function() {
  if (currentStep > 0) {
    currentStep--;
    render();
  }
});

nextBtn.addEventListener('click', function() {
  if (validateStep()) {
    completed[currentStep] = true;
    currentStep++;
    render();
  }
});

render();
</script>
</body>
</html>
